<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scaffolde — AI Verification Plane</title>

<!-- ============================================================
     FONTS: Geist (body/UI) + Geist Mono (data) per DESIGN.md v2.
     Loaded from Google Fonts (Vercel publishes Geist there).
     ============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;450;500;550;600;650;700&family=Geist+Mono:wght@400;500;600&display=swap" />

<style>
/* ============================================================
   DESIGN TOKENS  (DESIGN.md v2 — Modern SaaS)
   ============================================================ */
:root {
  --cobalt:#2563EB; --cobalt-deep:#1D4ED8; --cobalt-tint:#EFF4FF;
  --bg:#FFFFFF; --bg-alt:#F6F8FC;
  --surface:#FFFFFF; --border:#E2E8F0; --border-soft:#EEF2F7;
  --text:#0F172A; --body:#334155; --muted:#64748B; --faint:#94A3B8;
  --verified:#16A34A; --verified-bg:#E9F7EF;
  --pending:#D97706; --pending-bg:#FEF3E2;
  --error:#DC2626;
  /* model accent colors (for model-mix + chips) */
  --m-opus:#2563EB; --m-sonnet:#7C9CF6; --m-gpt:#16A34A; --m-gemini:#D97706;
  --r-sm:8px; --r-md:12px; --r-lg:16px;
  --shadow-card:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.06);
  --shadow-pop:0 8px 28px rgba(15,23,42,.12),0 2px 6px rgba(15,23,42,.08);
  --sidebar-w:236px;
  --font-sans:"Geist",system-ui,-apple-system,"Segoe UI",sans-serif;
  --font-mono:"Geist Mono",ui-monospace,"SF Mono",Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--font-sans);color:var(--body);background:var(--bg-alt);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-size:14px;line-height:1.5;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
a{color:inherit;text-decoration:none;}
svg{display:block;}
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;}

/* ============================================================ SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:16px 14px 14px;position:sticky;top:0;height:100vh;}
.brand{display:flex;align-items:center;padding:6px 6px 16px;}
.brand svg{height:38px;width:auto;}
.nav{display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav::-webkit-scrollbar{width:0;}
.nav-section{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--faint);padding:14px 10px 5px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:7px 10px;border-radius:var(--r-sm);
  color:var(--body);font-size:13.5px;font-weight:450;width:100%;text-align:left;
  transition:background .12s,color .12s;}
.nav-item svg{width:17px;height:17px;color:var(--faint);flex:none;transition:color .12s;}
.nav-item:hover{background:var(--bg-alt);color:var(--text);}
.nav-item:hover svg{color:var(--muted);}
.nav-item.active{background:var(--cobalt-tint);color:var(--cobalt-deep);font-weight:550;}
.nav-item.active svg{color:var(--cobalt);}
.nav-item .nav-count{margin-left:auto;font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums;
  font-family:var(--font-mono);}
.nav-item.active .nav-count{color:var(--cobalt);}
.nav-spacer{flex:1;min-height:12px;}
.workspace{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--border);
  border-radius:var(--r-md);width:100%;text-align:left;transition:background .12s,border-color .12s;}
.workspace:hover{background:var(--bg-alt);border-color:#D7DEE8;}
.ws-avatar{width:28px;height:28px;border-radius:7px;background:linear-gradient(140deg,#0F172A,#334155);
  color:#fff;font-size:12px;font-weight:600;display:grid;place-items:center;flex:none;}
.ws-text{flex:1;line-height:1.2;min-width:0;}
.ws-name{font-size:13px;font-weight:550;color:var(--text);}
.ws-sub{font-size:11px;color:var(--muted);}
.ws-chev{color:var(--faint);}

/* ============================================================ MAIN */
.main{padding:26px 34px 48px;max-width:1220px;overflow-x:hidden;}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:22px;}
.page-title{font-size:24px;font-weight:650;color:var(--text);letter-spacing:-.02em;}
.page-sub{font-size:14px;color:var(--muted);margin-top:4px;}
.head-actions{display:flex;align-items:center;gap:10px;flex:none;}

.pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);
  border-radius:var(--r-sm);background:var(--surface);font-size:13px;color:var(--body);
  transition:border-color .12s;}
.pill:hover{border-color:#CBD5E1;}
.pill svg{width:15px;height:15px;color:var(--muted);}
.pill .chev{width:14px;height:14px;}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:var(--r-sm);
  background:var(--cobalt);color:#fff;font-size:13px;font-weight:550;box-shadow:0 1px 2px rgba(37,99,235,.35);
  transition:background .12s,box-shadow .12s;}
.btn-primary:hover{background:var(--cobalt-deep);box-shadow:0 2px 6px rgba(37,99,235,.4);}
.btn-primary svg{width:15px;height:15px;}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r-sm);
  border:1px solid var(--border);font-size:12.5px;font-weight:500;color:var(--cobalt-deep);
  background:var(--surface);transition:background .12s,border-color .12s;}
.btn-ghost:hover{background:var(--cobalt-tint);border-color:#C7D7F5;}

/* ============================================================ KPI CARDS */
.kpis{display:grid;gap:16px;margin-bottom:18px;}
.kpis.k4{grid-template-columns:repeat(4,1fr);}
.kpis.k3{grid-template-columns:repeat(3,1fr);}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:16px 18px;box-shadow:var(--shadow-card);}
.kpi-top{display:flex;align-items:center;justify-content:space-between;}
.kpi-label{font-size:12.5px;color:var(--muted);font-weight:450;}
.kpi-icon{width:32px;height:32px;border-radius:9px;background:var(--cobalt-tint);
  display:grid;place-items:center;flex:none;}
.kpi-icon svg{width:17px;height:17px;color:var(--cobalt);}
.kpi-value{font-size:27px;font-weight:680;color:var(--text);letter-spacing:-.02em;margin:11px 0 7px;
  font-variant-numeric:tabular-nums;}
.kpi-delta{display:flex;align-items:center;gap:6px;font-size:12px;}
.delta-up{display:inline-flex;align-items:center;gap:3px;color:var(--verified);font-weight:600;}
.delta-up svg{width:12px;height:12px;}
.delta-down{display:inline-flex;align-items:center;gap:3px;color:var(--error);font-weight:600;}
.delta-down svg{width:12px;height:12px;}
.delta-note{color:var(--faint);}

/* ============================================================ CARDS / GRID */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  box-shadow:var(--shadow-card);margin-bottom:18px;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 6px;}
.card-title{font-size:15px;font-weight:600;color:var(--text);}
.card-sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
.grid-2{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;margin-bottom:18px;align-items:start;}
.grid-2b{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;align-items:start;}
@media (max-width:1100px){.grid-2,.grid-2b{grid-template-columns:1fr;}}

/* dropdown */
.dropdown{position:relative;}
.dd-trigger{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--border);
  border-radius:var(--r-sm);font-size:12.5px;color:var(--body);background:var(--surface);transition:border-color .12s;}
.dd-trigger:hover{border-color:#CBD5E1;}
.dd-trigger svg{width:13px;height:13px;color:var(--muted);}
.dd-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-md);box-shadow:var(--shadow-pop);padding:5px;min-width:130px;z-index:30;display:none;}
.dd-menu.open{display:block;}
.dd-opt{display:block;width:100%;text-align:left;padding:7px 10px;border-radius:6px;font-size:13px;color:var(--body);}
.dd-opt:hover{background:var(--bg-alt);}
.dd-opt.sel{color:var(--cobalt-deep);font-weight:550;}

/* chart */
.chart-wrap{padding:8px 14px 16px;position:relative;}
.linechart{width:100%;height:230px;display:block;overflow:visible;}
.chart-legend{display:flex;gap:18px;padding:0 20px 16px;font-size:12px;color:var(--muted);}
.legend-dot{display:inline-flex;align-items:center;gap:7px;}
.legend-dot i{width:10px;height:3px;border-radius:2px;background:var(--cobalt);display:inline-block;}
.chart-tip{position:absolute;pointer-events:none;background:#0F172A;color:#fff;padding:8px 11px;border-radius:8px;
  font-size:12px;white-space:nowrap;box-shadow:0 6px 18px rgba(15,23,42,.28);transform:translate(-50%,-120%);
  opacity:0;transition:opacity .1s;z-index:20;}
.chart-tip .tip-date{color:#93C5FD;display:block;font-size:11px;margin-bottom:2px;}
.chart-hover-dot{position:absolute;width:11px;height:11px;border-radius:50%;background:var(--cobalt);
  border:2.5px solid #fff;box-shadow:0 0 0 1px var(--cobalt),0 2px 5px rgba(37,99,235,.5);
  transform:translate(-50%,-50%);opacity:0;transition:opacity .1s;pointer-events:none;}

/* ============================================================ MODEL MIX (donut + bars) */
.modelmix{padding:16px 20px 20px;display:flex;gap:18px;align-items:center;}
.donut-wrap{position:relative;flex:none;}
.donut-center{position:absolute;inset:0;display:grid;place-items:center;text-align:center;}
.donut-center b{font-size:20px;font-weight:680;color:var(--text);display:block;line-height:1;}
.donut-center span{font-size:10.5px;color:var(--muted);}
.model-list{flex:1;display:flex;flex-direction:column;gap:14px;}
/* column header row: clarifies USAGE vs PASS RATE */
.model-colhead{display:grid;grid-template-columns:minmax(0,1fr) 50px 58px;gap:10px;align-items:center;
  padding-bottom:2px;border-bottom:1px solid var(--border-soft);}
.model-colhead .ch{font-size:9.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);}
.model-colhead .ch.r{text-align:right;}
.model-row{display:grid;grid-template-columns:minmax(0,1fr) 50px 58px;gap:6px 10px;align-items:center;}
/* full model id stays legible & distinct — no truncation; wrap if tight */
.model-name{display:flex;align-items:center;gap:7px;min-width:0;font-size:11.5px;color:var(--text);font-family:var(--font-mono);font-weight:500;
  white-space:normal;overflow-wrap:anywhere;line-height:1.2;}
.model-name i{width:9px;height:9px;border-radius:3px;flex:none;}
/* USAGE share (matches donut segment) */
.model-share{font-size:13px;color:var(--text);font-weight:600;text-align:right;font-variant-numeric:tabular-nums;}
/* PASS RATE chip — visually distinct (green pill) so it can't blur with share */
.model-pass{justify-self:end;display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;
  background:var(--verified-bg);color:var(--verified);font-size:11.5px;font-weight:600;font-variant-numeric:tabular-nums;}
.model-pass svg{width:11px;height:11px;}
.model-bar{grid-column:1/4;height:5px;border-radius:3px;background:var(--border-soft);overflow:hidden;margin-top:-1px;}
.model-bar span{display:block;height:100%;border-radius:3px;}

/* ============================================================ MINI LISTS */
.mini{padding:8px 8px 10px;}
.mini-row{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-sm);transition:background .1s;}
.mini-row:hover{background:var(--bg-alt);}
.mini-av{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none;
  font-size:12px;font-weight:600;color:#fff;font-family:var(--font-sans);}
.mini-main{flex:1;min-width:0;line-height:1.25;}
.mini-name{font-size:13px;font-weight:550;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-sub{font-size:11.5px;color:var(--muted);font-family:var(--font-mono);}
.mini-meta{text-align:right;line-height:1.25;flex:none;}
.mini-val{font-size:13px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;}
.mini-pass{font-size:11px;color:var(--verified);font-weight:600;}

/* ============================================================ TABLE */
table{width:100%;border-collapse:collapse;}
thead th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;
  color:var(--faint);padding:0 20px 10px;border-bottom:1px solid var(--border);}
thead th.num{text-align:right;}
tbody td{padding:13px 20px;border-bottom:1px solid var(--border-soft);font-size:13.5px;color:var(--body);vertical-align:middle;}
tbody td.num{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--font-mono);font-size:12.5px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .1s;}
tbody tr.clickable{cursor:pointer;}
tbody tr:hover{background:var(--bg-alt);}
.mono-link{font-family:var(--font-mono);font-size:12.5px;color:var(--cobalt-deep);font-weight:500;}
.mono-link:hover{text-decoration:underline;}
.cell-strong{color:var(--text);font-weight:500;}
/* sessions: subject leads, gets the most width + emphasis */
.sess-subject{min-width:240px;}
.sess-subject .cell-strong{font-size:13.5px;font-weight:550;}

/* entity (agent/provider) cell */
.entity{display:flex;align-items:center;gap:11px;}
.ent-logo{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none;
  font-size:11px;font-weight:700;color:#fff;}
.ent-text{line-height:1.25;min-width:0;}
.ent-name{color:var(--text);font-weight:550;font-size:13px;}
.ent-sub{font-size:11.5px;color:var(--muted);}

/* status pills */
.status{display:inline-flex;align-items:center;gap:6px;padding:4px 10px 4px 8px;border-radius:999px;
  font-size:12px;font-weight:600;}
.status svg{width:13px;height:13px;}
.status.ok{background:var(--verified-bg);color:var(--verified);}
.status.pending{background:var(--pending-bg);color:var(--pending);}
.model-chip{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;
  background:var(--bg-alt);border:1px solid var(--border);font-size:11.5px;color:var(--body);
  font-family:var(--font-mono);font-weight:500;}
.model-chip i{width:8px;height:8px;border-radius:2px;flex:none;}
/* generic small tag (skill names, workflow steps, memory types) */
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;
  font-size:11.5px;font-weight:500;background:var(--bg-alt);border:1px solid var(--border);color:var(--body);}
.tag.mono{font-family:var(--font-mono);}
.tag.cobalt{background:var(--cobalt-tint);border-color:#D6E2FB;color:var(--cobalt-deep);}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;}
.pass-good{color:var(--verified);font-weight:600;}
/* status pill variants for promoted / candidate / drift */
.status.promoted{background:var(--verified-bg);color:var(--verified);}
.status.candidate{background:var(--cobalt-tint);color:var(--cobalt-deep);}
.status.drift{background:var(--pending-bg);color:var(--pending);}
/* memory-type colored dot chips */
.mtype{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--body);}
.mtype i{width:8px;height:8px;border-radius:3px;flex:none;}
/* cell that holds a primary title + sub line */
.cell-titled{line-height:1.3;min-width:200px;}
.cell-titled .t{font-size:13.5px;font-weight:550;color:var(--text);}
.cell-titled .s{font-size:11.5px;color:var(--muted);margin-top:2px;}
.cell-learning{max-width:420px;}
.cell-learning .t{font-size:13.5px;color:var(--text);font-weight:450;line-height:1.4;}
.cell-learning code{font-family:var(--font-mono);font-size:11.5px;background:var(--bg-alt);padding:1px 5px;border-radius:4px;color:var(--text);}

.kebab{width:28px;height:28px;border-radius:6px;display:grid;place-items:center;color:var(--faint);
  transition:background .12s,color .12s;}
.kebab:hover{background:var(--bg-alt);color:var(--muted);}
.kebab svg{width:16px;height:16px;}
.td-right{text-align:right;}
.kebab-menu{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);
  box-shadow:var(--shadow-pop);padding:5px;min-width:160px;z-index:40;}
.kebab-menu button{display:block;width:100%;text-align:left;padding:7px 10px;border-radius:6px;font-size:13px;color:var(--body);}
.kebab-menu button:hover{background:var(--bg-alt);}

/* ============================================================ SESSION DRAWER */
.drawer-scrim{position:fixed;inset:0;background:rgba(15,23,42,.32);opacity:0;pointer-events:none;
  transition:opacity .2s;z-index:50;}
.drawer-scrim.open{opacity:1;pointer-events:auto;}
.drawer{position:fixed;top:0;right:0;height:100vh;width:440px;max-width:92vw;background:var(--surface);
  border-left:1px solid var(--border);box-shadow:-12px 0 40px rgba(15,23,42,.14);z-index:51;
  transform:translateX(100%);transition:transform .26s cubic-bezier(.22,1,.36,1);overflow-y:auto;}
.drawer.open{transform:none;}
.drawer-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  padding:22px 24px 16px;border-bottom:1px solid var(--border);}
.drawer-title{font-family:var(--font-mono);font-size:15px;font-weight:600;color:var(--text);}
.drawer-sub{font-size:12.5px;color:var(--muted);margin-top:4px;}
.drawer-close{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--muted);
  transition:background .12s;flex:none;}
.drawer-close:hover{background:var(--bg-alt);}
.drawer-close svg{width:18px;height:18px;}
.drawer-body{padding:18px 24px 32px;}
.dr-section{margin-bottom:22px;}
.dr-label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:10px;}
.dr-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;}
.dr-meta div{line-height:1.3;}
.dr-meta dt{font-size:11.5px;color:var(--muted);}
.dr-meta dd{font-size:13.5px;color:var(--text);font-weight:550;margin-top:2px;}
.dr-meta dd.mono{font-family:var(--font-mono);font-size:12.5px;}
.proof-card{border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;background:var(--bg-alt);}
.proof-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:12.5px;}
.proof-row .k{color:var(--muted);}
.proof-row .v{font-family:var(--font-mono);color:var(--text);font-size:12px;}
.hash{font-family:var(--font-mono);font-size:11.5px;color:var(--cobalt-deep);word-break:break-all;}
.timeline{position:relative;padding-left:20px;}
.timeline::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border);}
.tl-step{position:relative;padding:0 0 16px;}
.tl-step:last-child{padding-bottom:0;}
.tl-dot{position:absolute;left:-19px;top:2px;width:12px;height:12px;border-radius:50%;
  background:var(--verified);border:2.5px solid var(--surface);box-shadow:0 0 0 1px var(--verified);}
.tl-title{font-size:13px;font-weight:550;color:var(--text);}
.tl-time{font-size:11.5px;color:var(--muted);font-family:var(--font-mono);margin-top:1px;}
/* drawer: produced-content sections (skills / learnings / improvements / memories) */
.dr-summary{font-size:13.5px;color:var(--body);line-height:1.55;}
.dr-label .lbl-icon{display:inline-flex;vertical-align:-2px;margin-right:6px;}
.dr-label .lbl-icon svg{width:14px;height:14px;}
.dr-label.cap{display:flex;align-items:center;gap:6px;}
.dr-label.cap svg{width:14px;height:14px;color:var(--cobalt);}
.chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;background:var(--cobalt-tint);
  color:var(--cobalt-deep);border:1px solid #D6E2FB;font-size:12px;font-weight:500;font-family:var(--font-mono);}
.dr-list{list-style:none;display:flex;flex-direction:column;gap:9px;}
.dr-list li{position:relative;padding-left:20px;font-size:13px;color:var(--body);line-height:1.45;}
.dr-list li::before{content:"";position:absolute;left:4px;top:7px;width:6px;height:6px;border-radius:2px;}
.dr-list.learn li::before{background:var(--cobalt);}
.dr-list.improve li::before{background:var(--verified);}
.dr-list.mem li::before{background:#7C3AED;}
.dr-list code{font-family:var(--font-mono);font-size:11.5px;background:var(--bg-alt);padding:1px 4px;border-radius:4px;color:var(--text);}

/* ============================================================ STUB */
.stub{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  box-shadow:var(--shadow-card);padding:60px 40px;text-align:center;}
.stub-icon{width:52px;height:52px;border-radius:14px;background:var(--cobalt-tint);display:grid;place-items:center;margin:0 auto 18px;}
.stub-icon svg{width:26px;height:26px;color:var(--cobalt);}
.stub-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px;}
.stub-text{font-size:14px;color:var(--muted);max-width:430px;margin:0 auto;}
.stub-badge{display:inline-block;margin-top:18px;padding:5px 12px;border-radius:999px;background:var(--cobalt-tint);
  border:1px solid #D6E2FB;font-size:11.5px;color:var(--cobalt-deep);font-weight:550;}

/* ============================================================ LIVE OBSERVABILITY */
/* nav pulse dot */
.nav-pulse{margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--verified);flex:none;
  box-shadow:0 0 0 0 rgba(22,163,74,.5);animation:pulse 1.8s ease-out infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(22,163,74,.5);}70%{box-shadow:0 0 0 6px rgba(22,163,74,0);}100%{box-shadow:0 0 0 0 rgba(22,163,74,0);}}
/* LIVE badge in header */
.live-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;
  background:var(--verified-bg);color:var(--verified);font-size:12px;font-weight:600;letter-spacing:.04em;}
.live-badge .ld{width:8px;height:8px;border-radius:50%;background:var(--verified);
  box-shadow:0 0 0 0 rgba(22,163,74,.5);animation:pulse 1.8s ease-out infinite;}
/* live counters: same KPI shell but with a live tick highlight */
.kpi.live-kpi .kpi-value{transition:color .25s;}
.kpi.live-kpi.tick .kpi-value{color:var(--cobalt);}
.kpi-live-tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);}
.kpi-live-tag i{width:6px;height:6px;border-radius:50%;background:var(--verified);animation:pulse 1.8s ease-out infinite;}
/* activity stream */
.stream{padding:6px 8px 10px;max-height:520px;overflow:hidden;}
.stream-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r-sm);
  border-bottom:1px solid var(--border-soft);}
.stream-row:last-child{border-bottom:none;}
.stream-row.fresh{animation:streamIn .42s cubic-bezier(.22,1,.36,1);}
@keyframes streamIn{from{opacity:0;transform:translateY(-8px);background:var(--cobalt-tint);}to{opacity:1;transform:none;background:transparent;}}
.stream-time{font-family:var(--font-mono);font-size:11.5px;color:var(--muted);width:64px;flex:none;font-variant-numeric:tabular-nums;}
.stream-ag{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none;font-size:10.5px;font-weight:600;color:#fff;}
.stream-main{flex:1;min-width:0;line-height:1.3;}
.stream-title{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stream-title b{font-family:var(--font-mono);font-weight:500;color:var(--cobalt-deep);}
.stream-sub{font-size:11.5px;color:var(--muted);font-family:var(--font-mono);}
.stream-tok{font-family:var(--font-mono);font-size:12px;color:var(--body);flex:none;font-variant-numeric:tabular-nums;}
.stream-status{flex:none;}
.status.reverify{background:var(--cobalt-tint);color:var(--cobalt-deep);}
/* spark */
.spark-wrap{padding:6px 16px 16px;}
.spark{width:100%;height:64px;display:block;overflow:visible;}

.view{animation:fade .22s cubic-bezier(.22,1,.36,1);}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){.view{animation:none;}.drawer{transition:none;}
  .nav-pulse,.live-badge .ld,.kpi-live-tag i{animation:none;}.stream-row.fresh{animation:none;}}

@media (max-width:1024px){.kpis.k4{grid-template-columns:repeat(2,1fr);}.kpis.k3{grid-template-columns:1fr;}.main{padding:22px;}}
@media (max-width:860px){.app{grid-template-columns:1fr;}.sidebar{display:none;}}

/* live engine: counters tick + stream prepend + spark redraw */
let LIVE_TIMERS=[];
let liveCounters={runHr:1284,tok:3.41,agents:29,passNum:984};
let SPARK=Array.from({length:30},()=>30+Math.floor(Math.random()*60));
function startLive(){
  if(REDUCED){ drawSpark(); return; } // freeze for reduced-motion; static seed list stays
  drawSpark();
  // counters tick every 1.2s
  LIVE_TIMERS.push(setInterval(()=>{
    liveCounters.runHr+=Math.floor(Math.random()*4);
    liveCounters.tok=+(liveCounters.tok+Math.random()*0.05).toFixed(2);
    liveCounters.agents=27+Math.floor(Math.random()*8);
    liveCounters.passNum=981+Math.floor(Math.random()*16);
    tickKpi('runHr',liveCounters.runHr.toLocaleString());
    tickKpi('tok',liveCounters.tok.toFixed(2)+'M');
    tickKpi('agents',String(liveCounters.agents));
    tickKpi('pass',(liveCounters.passNum/10).toFixed(1)+'%');
  },1200));
  // stream prepend every ~2.4s (jittered 2-3s)
  function schedule(){
    const delay=2000+Math.random()*1000;
    LIVE_TIMERS.push(setTimeout(()=>{
      const stream=document.getElementById('stream');
      if(stream){
        const e=liveEvent();
        stream.insertAdjacentHTML('afterbegin',streamRowHTML(e,true));
        while(stream.children.length>9) stream.removeChild(stream.lastChild);
        // push spark + redraw
        SPARK.push(30+Math.floor(Math.random()*60)); if(SPARK.length>30)SPARK.shift(); drawSpark();
      }
      if(activeView==='live') schedule();
    },delay));
  }
  schedule();
}
function stopLive(){LIVE_TIMERS.forEach(t=>{clearInterval(t);clearTimeout(t);});LIVE_TIMERS=[];}
function tickKpi(id,val){
  const card=document.querySelector(`[data-livekpi="${id}"]`); if(!card)return;
  card.querySelector('[data-val]').textContent=val;
  card.classList.add('tick'); setTimeout(()=>card.classList.remove('tick'),250);
}
function drawSpark(){
  const el=document.getElementById('spark'); if(!el)return;
  const W=720,H=64,n=SPARK.length,max=100;
  const x=i=>(i/(n-1))*W, y=v=>H-(v/max)*(H-8)-4;
  const pts=SPARK.map((v,i)=>({x:x(i),y:y(v)}));
  const line=pts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const area=`${line} L ${W} ${H} L 0 ${H} Z`;
  el.innerHTML=`<defs><linearGradient id="spk" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2563EB" stop-opacity="0.20"/><stop offset="100%" stop-color="#2563EB" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#spk)"/>
    <path d="${line}" fill="none" stroke="#2563EB" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
}

/* ============================================================ CHART ENGINE */
const VW=760,VH=230,PAD={l:42,r:12,t:14,b:26};
const CHART_CACHE=new WeakMap();
function drawChart(svgEl,data,maxY){
  const w=VW-PAD.l-PAD.r,h=VH-PAD.t-PAD.b;
  const x=i=>PAD.l+(i/(data.length-1))*w, y=v=>PAD.t+h-(v/maxY)*h;
  const pts=data.map((d,i)=>({x:x(i),y:y(d.v),d}));
  CHART_CACHE.set(svgEl,{pts,data});
  const step=maxY/4;
  let grid='';
  for(let g=0;g<=maxY;g+=step){const gy=y(g);
    grid+=`<line x1="${PAD.l}" y1="${gy}" x2="${VW-PAD.r}" y2="${gy}" stroke="#EEF2F7" stroke-width="1"/>`;
    const lbl=g>=1000?(g/1000)+'K':g;
    grid+=`<text x="${PAD.l-8}" y="${gy+3.5}" text-anchor="end" font-size="10" fill="#94A3B8" font-family="var(--font-mono)">${lbl}</text>`;}
  let xl='';
  data.forEach((d,i)=>{if(i%5===0||i===data.length-1){
    xl+=`<text x="${x(i)}" y="${VH-8}" text-anchor="middle" font-size="10" fill="#94A3B8">${d.date.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</text>`;}});
  const line=pts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const area=`${line} L ${pts[pts.length-1].x.toFixed(1)} ${y(0)} L ${pts[0].x.toFixed(1)} ${y(0)} Z`;
  const gid='ag'+Math.random().toString(36).slice(2,7);
  svgEl.innerHTML=`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.18"/><stop offset="100%" stop-color="#2563EB" stop-opacity="0"/></linearGradient></defs>
    ${grid}<path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="#2563EB" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>${xl}`;
}
function wireChartHover(svgEl){
  const wrap=svgEl.closest('.chart-wrap');
  const tip=wrap.querySelector('.chart-tip'), dot=wrap.querySelector('.chart-hover-dot');
  function pos(p){const r=svgEl.getBoundingClientRect(),wr=wrap.getBoundingClientRect();
    return {x:(p.x/VW)*r.width+(r.left-wr.left),y:(p.y/VH)*r.height+(r.top-wr.top)};}
  svgEl.addEventListener('mousemove',e=>{
    const c=CHART_CACHE.get(svgEl);if(!c)return;
    const r=svgEl.getBoundingClientRect(),relX=((e.clientX-r.left)/r.width)*VW;
    let best=0,bd=Infinity;c.pts.forEach((p,i)=>{const d=Math.abs(p.x-relX);if(d<bd){bd=d;best=i;}});
    const p=c.pts[best],ps=pos(p);
    dot.style.left=ps.x+'px';dot.style.top=ps.y+'px';dot.style.opacity=1;
    tip.style.left=ps.x+'px';tip.style.top=ps.y+'px';tip.style.opacity=1;
    tip.innerHTML=`<span class="tip-date">${p.d.label}</span><b>${p.d.v.toLocaleString()}</b> ${wrap.dataset.chart==='att'?'Verifications':'Verified runs'}`;
  });
  svgEl.addEventListener('mouseleave',()=>{dot.style.opacity=0;tip.style.opacity=0;});
}
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{
  document.querySelectorAll('[data-svg]').forEach(svgEl=>drawChart(svgEl,SERIES,1400));
},120);});

/* ============================================================ SESSION DRAWER (the session detail — what it did, learned, proved) */
function openSession(id){
  const s=SESSIONS.find(x=>x.id===id); if(!s)return;
  const verified=s.status==='ok';
  // only render produced-content sections that have content for THIS session
  const sec=(cls,iconPath,label,bodyHTML)=>bodyHTML
    ?`<div class="dr-section"><div class="dr-label cap">${svg(iconPath)}${label}</div>${bodyHTML}</div>`:'';
  const skillsHTML = (s.skills&&s.skills.length)
    ? `<div class="chips">${s.skills.map(k=>`<span class="chip">${k}</span>`).join('')}</div>` : '';
  const listHTML=(arr,cls)=> (arr&&arr.length)
    ? `<ul class="dr-list ${cls}">${arr.map(t=>`<li>${t.replace(/`([^`]+)`/g,'<code>$1</code>')}</li>`).join('')}</ul>` : '';

  const drawer=document.getElementById('drawer'),scrim=document.getElementById('scrim');
  drawer.innerHTML=`
    <div class="drawer-head">
      <div><div class="drawer-title">${s.subject}</div><div class="drawer-sub">${s.id} · ${s.agent} · ${s.project}</div></div>
      <button class="drawer-close" id="drawerClose">${svg(ICON.close)}</button>
    </div>
    <div class="drawer-body">
      <div class="dr-section">
        <div style="margin-bottom:14px">${statusPill(s.status)}</div>
        <p class="dr-summary" style="margin-bottom:16px">${s.summary}</p>
        <dl class="dr-meta">
          <div><dt>Agent</dt><dd>${s.agent}</dd></div>
          <div><dt>Project</dt><dd>${s.project}</dd></div>
          <div><dt>Model</dt><dd class="mono">${s.model}</dd></div>
          <div><dt>Tokens</dt><dd class="mono">${s.tokens}</dd></div>
          <div><dt>Duration</dt><dd class="mono">${s.dur}</dd></div>
          <div><dt>Started</dt><dd class="mono">${s.started}</dd></div>
        </dl>
      </div>

      ${sec('skills',ICON.sparkles,'Skills used',skillsHTML)}
      ${sec('learn',ICON.brain,'Learnings captured',listHTML(s.learnings,'learn'))}
      ${sec('improve',ICON.wrench,'Improvements made',listHTML(s.improvements,'improve'))}
      ${sec('mem',ICON.memories,'Memories captured',listHTML(s.memories,'mem'))}

      <div class="dr-section">
        <div class="dr-label cap">${svg(ICON.shield)}Verification</div>
        <div class="timeline" style="margin-bottom:14px">
          <div class="tl-step"><span class="tl-dot"></span><div class="tl-title">Session recorded</div><div class="tl-time">inputs + tool calls captured</div></div>
          <div class="tl-step"><span class="tl-dot"></span><div class="tl-title">Outputs hashed</div><div class="tl-time">merkle root computed</div></div>
          <div class="tl-step"><span class="tl-dot"></span><div class="tl-title">Independently verified</div><div class="tl-time">grader ≠ graded</div></div>
        </div>
        ${verified?`<div class="proof-card">
          <div class="proof-row"><span class="k">Attestation ID</span><span class="v" style="color:var(--cobalt-deep)">${s.att}</span></div>
          <div class="proof-row"><span class="k">Task</span><span class="v">${s.id}</span></div>
          <div class="proof-row"><span class="k">Signed</span><span class="v">${s.started}</span></div>
          <div class="proof-row" style="display:block;padding-top:10px"><span class="k" style="display:block;margin-bottom:5px">Proof hash (SHA-256)</span>
            <span class="hash">b1f4${id.slice(-4).toLowerCase()}9ad2c70e3f8a41bb6c2e5d09a7f3</span></div>
          <button class="btn-ghost" style="margin-top:12px;width:100%;justify-content:center">${svg(ICON.external)}Open attestation</button>
        </div>`:`<div class="proof-card">
          <div class="proof-row"><span class="k">Status</span><span class="v" style="color:var(--pending)">Verification in progress</span></div>
          <div class="proof-row"><span class="k">ETA</span><span class="v">~2 min</span></div></div>`}
      </div>
    </div>`;
  drawer.classList.add('open');scrim.classList.add('open');
  document.getElementById('drawerClose').addEventListener('click',closeDrawer);
}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('scrim').classList.remove('open');}
document.getElementById('scrim').addEventListener('click',closeDrawer);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});

/* workspace switcher */
document.getElementById('workspace').addEventListener('click',function(){flash(this);});

/* ============================================================ BOOT */
/* Deep-link support (for clean screenshot capture):
   ?view=overview|live|sessions|agents|skills|workflows|projects|models|learnings|memories
   ?session=SCA-4821  — opens that session's detail drawer on load (with view=sessions).
   No params => boot to Overview exactly as before. */
renderNav();
(function boot(){
  const VIEWS=['overview','live','sessions','agents','skills','workflows','projects','models','learnings','memories'];
  let view='overview', session=null;
  try{
    const q=new URLSearchParams(window.location.search);
    const v=q.get('view'); if(v&&VIEWS.includes(v)) view=v;
    const s=q.get('session'); if(s) session=s;
  }catch(e){/* malformed query — fall back to overview */}
  setView(view);
  if(session&&SESSIONS.some(x=>x.id===session)) openSession(session);
})();
</script>
