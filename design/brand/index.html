<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Scaffolde logo</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;800&family=Geist+Mono:wght@500;600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@800,900&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:'Geist',system-ui,sans-serif;color:#0F172A;background:#fff}
  .wrap{max-width:1000px;margin:0 auto;padding:48px 32px}
  h2{font-family:'Satoshi','Geist';font-weight:800;font-size:1.1rem;color:#64748B;margin:40px 0 14px;letter-spacing:-.01em}
  .row{display:flex;align-items:center;gap:40px;flex-wrap:wrap}
  .panel{padding:28px 32px;border:1px solid #E2E8F0;border-radius:16px}
  .light{background:#fff}.tint{background:#F6F8FC}.dark{background:#0B1F3A}
  .dark .swap{filter:none}
  .sizes{display:flex;align-items:flex-end;gap:28px}
  .cap{font-family:'Geist Mono';font-size:11px;color:#94A3B8;margin-top:8px}
  img{display:block}
</style></head><body><div class="wrap">
  <div style="font-family:'Geist Mono';font-size:12px;color:#94A3B8;letter-spacing:1px">SCAFFOLDE · BRAND · tightened logo + AI-verification descriptor</div>

  <h2>Primary lockup</h2>
  <div class="row">
    <div class="panel light"><img src="scaffolde-logo.svg" width="248" height="56" alt=""/></div>
    <div class="panel tint"><img src="scaffolde-logo.svg" width="248" height="56" alt=""/></div>
  </div>

  <h2>On dark (investor / footer)</h2>
  <div class="panel dark" style="display:inline-flex;gap:16px;align-items:center">
    <img src="scaffolde-mark.svg" width="44" height="44" alt=""/>
    <div>
      <div style="font-family:'Satoshi','Geist';font-weight:800;font-size:25px;color:#fff;letter-spacing:-.5px;line-height:1">Scaffolde</div>
      <div style="font-family:'Geist Mono';font-size:10.5px;font-weight:600;letter-spacing:2.4px;color:#7AA5FF;margin-top:3px">AI-VERIFICATION</div>
    </div>
  </div>

  <h2>Mark · scalability (favicon → app icon)</h2>
  <div class="sizes">
    <div><img class="swap" src="scaffolde-mark.svg" width="16" height="16"/><div class="cap">16</div></div>
    <div><img class="swap" src="scaffolde-mark.svg" width="24" height="24"/><div class="cap">24</div></div>
    <div><img class="swap" src="scaffolde-mark.svg" width="32" height="32"/><div class="cap">32</div></div>
    <div><img class="swap" src="scaffolde-mark.svg" width="48" height="48"/><div class="cap">48</div></div>
    <div><img class="swap" src="scaffolde-mark.svg" width="72" height="72"/><div class="cap">72</div></div>
    <div style="background:#2563EB;border-radius:18px;padding:14px"><img src="scaffolde-mark.svg" width="64" height="64" style="filter:brightness(0) invert(1)"/><div class="cap" style="color:#cfe0ff">app tile</div></div>
  </div>
</div></body></html>
