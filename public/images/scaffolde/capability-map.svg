<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Scaffolde capability factory map</title>
  <desc id="desc">A visual system map showing intent flowing through PAI, Hermes, specialist agents, memory, gstack verification, and public surfaces.</desc>
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M 42 0 L 0 0 0 42" fill="none" stroke="#1a1a1a" stroke-opacity="0.07" stroke-width="1"/></pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1a1a1a" flood-opacity="0.16"/></filter>
    <linearGradient id="orange" x1="0" x2="1"><stop offset="0" stop-color="#f08a3c"/><stop offset="1" stop-color="#d9621c"/></linearGradient>
  </defs>
  <rect width="1200" height="820" fill="#f5f5f0"/>
  <rect width="1200" height="820" fill="url(#grid)"/>
  <g fill="none" stroke="#2aa6a8" stroke-width="2" stroke-opacity="0.45">
    <path d="M150 408 C280 220 398 190 548 318"/>
    <path d="M150 408 C310 492 442 522 585 458"/>
    <path d="M610 390 C730 220 870 180 1035 248"/>
    <path d="M610 390 C760 450 864 536 1035 575"/>
    <path d="M590 385 C662 334 728 335 798 384" stroke="#d9621c" stroke-width="4" stroke-opacity="0.65"/>
    <path d="M600 430 C720 515 782 515 900 460" stroke="#d9621c" stroke-width="4" stroke-opacity="0.55"/>
  </g>
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="17" fill="#1a1a1a">
    <g filter="url(#soft)">
      <rect x="70" y="330" width="190" height="145" rx="28" fill="#111"/>
      <text x="105" y="382" fill="#f5f5f0" font-size="18" font-weight="700">intent</text>
      <text x="105" y="418" fill="#f5f5f0" opacity="0.58" font-size="13">goal + context</text>
      <circle cx="218" cy="382" r="18" fill="url(#orange)"/>
    </g>
    <g filter="url(#soft)">
      <rect x="430" y="285" width="250" height="210" rx="34" fill="#fefdf8" stroke="#1a1a1a" stroke-width="3"/>
      <text x="472" y="350" font-size="42" font-family="Outfit, sans-serif" font-weight="800">PAI</text>
      <text x="472" y="388" opacity="0.65" font-size="14">ideal state artifact</text>
      <text x="472" y="420" opacity="0.65" font-size="14">criteria + phase loop</text>
      <rect x="472" y="444" width="150" height="14" rx="7" fill="#d9621c" opacity="0.9"/>
    </g>
    <g filter="url(#soft)">
      <rect x="790" y="125" width="260" height="170" rx="30" fill="#111"/>
      <text x="830" y="184" fill="#f5f5f0" font-weight="700">specialist agents</text>
      <text x="830" y="222" fill="#f5f5f0" opacity="0.58" font-size="13">Hermes / Codex / Claude</text>
      <g fill="#d9621c"><circle cx="850" cy="256" r="7"/><circle cx="882" cy="256" r="7"/><circle cx="914" cy="256" r="7"/></g>
    </g>
    <g filter="url(#soft)">
      <rect x="820" y="365" width="260" height="150" rx="28" fill="#fff" stroke="#d4d4cc" stroke-width="2"/>
      <text x="860" y="422" font-weight="700">GStack proof</text>
      <text x="860" y="458" opacity="0.62" font-size="13">browser QA + reviews</text>
      <path d="M860 480 h130" stroke="#d9621c" stroke-width="8" stroke-linecap="round"/>
    </g>
    <g filter="url(#soft)">
      <rect x="760" y="565" width="315" height="155" rx="28" fill="#fefdf8" stroke="#1a1a1a" stroke-width="3"/>
      <text x="805" y="620" font-weight="700">public surfaces</text>
      <text x="805" y="656" opacity="0.62" font-size="13">HTML / Markdown / JSON / llms.txt</text>
      <rect x="805" y="674" width="210" height="16" rx="8" fill="#2aa6a8" opacity="0.55"/>
    </g>
    <g filter="url(#soft)">
      <rect x="120" y="575" width="275" height="145" rx="28" fill="#fefdf8" stroke="#1a1a1a" stroke-width="3"/>
      <text x="160" y="630" font-weight="700">memory</text>
      <text x="160" y="666" opacity="0.62" font-size="13">GBrain + SecondBrain</text>
      <g fill="none" stroke="#d9621c" stroke-width="3"><path d="M160 688 h165"/><path d="M160 706 h115"/></g>
    </g>
    <g filter="url(#soft)">
      <rect x="125" y="105" width="250" height="150" rx="28" fill="#fff" stroke="#d4d4cc" stroke-width="2"/>
      <text x="165" y="160" font-weight="700">skills</text>
      <text x="165" y="196" opacity="0.62" font-size="13">reusable procedures</text>
      <path d="M165 218 h145" stroke="#d9621c" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>
  <g fill="none" stroke="#d9621c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M260 402 L430 385"/><path d="M680 360 L790 235"/><path d="M680 420 L820 435"/><path d="M935 515 L930 565"/><path d="M432 468 L395 590"/><path d="M425 335 L375 220"/>
  </g>
  <g fill="#d9621c"><circle cx="430" cy="385" r="7"/><circle cx="790" cy="235" r="7"/><circle cx="820" cy="435" r="7"/><circle cx="930" cy="565" r="7"/><circle cx="395" cy="590" r="7"/><circle cx="375" cy="220" r="7"/></g>
</svg>