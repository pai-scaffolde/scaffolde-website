<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Scaffolde operating loop</title>
  <desc id="desc">A circular diagram showing define, dispatch, coordinate, verify, and learn around a central ideal state artifact.</desc>
  <defs><pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0 L0 0 0 36" fill="none" stroke="#1a1a1a" stroke-opacity=".06"/></pattern><filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="13" flood-opacity=".15"/></filter></defs>
  <rect width="900" height="900" fill="#f5f5f0"/><rect width="900" height="900" fill="url(#grid)"/>
  <circle cx="450" cy="450" r="285" fill="none" stroke="#2aa6a8" stroke-width="3" stroke-dasharray="9 12" opacity=".45"/>
  <circle cx="450" cy="450" r="205" fill="none" stroke="#d9621c" stroke-width="5" opacity=".55"/>
  <g fill="none" stroke="#d9621c" stroke-width="5" stroke-linecap="round"><path d="M629 350 q52 86 26 185"/><path d="M469 654 q-100 9 -178 -55"/><path d="M265 382 q33 -96 122 -142"/></g>
  <g filter="url(#shadow)" font-family="JetBrains Mono, ui-monospace, monospace">
    <rect x="325" y="335" width="250" height="230" rx="34" fill="#111"/><text x="373" y="408" fill="#f5f5f0" font-size="19" font-weight="700">ideal state</text><text x="373" y="447" fill="#f5f5f0" opacity=".58" font-size="13">criteria</text><text x="373" y="477" fill="#f5f5f0" opacity=".58" font-size="13">evidence</text><text x="373" y="507" fill="#f5f5f0" opacity=".58" font-size="13">decisions</text>
  </g>
  <g font-family="Outfit, sans-serif" font-weight="800" font-size="30" fill="#1a1a1a" text-anchor="middle">
    <g filter="url(#shadow)"><circle cx="450" cy="130" r="72" fill="#fff" stroke="#1a1a1a" stroke-width="3"/><text x="450" y="141">define</text></g>
    <g filter="url(#shadow)"><circle cx="728" cy="292" r="72" fill="#fff" stroke="#1a1a1a" stroke-width="3"/><text x="728" y="303">dispatch</text></g>
    <g filter="url(#shadow)"><circle cx="728" cy="608" r="72" fill="#fff" stroke="#1a1a1a" stroke-width="3"/><text x="728" y="619">verify</text></g>
    <g filter="url(#shadow)"><circle cx="450" cy="770" r="72" fill="#fff" stroke="#1a1a1a" stroke-width="3"/><text x="450" y="781">learn</text></g>
    <g filter="url(#shadow)"><circle cx="172" cy="608" r="72" fill="#fff" stroke="#1a1a1a" stroke-width="3"/><text x="172" y="619">memory</text></g>
    <g filter="url(#shadow)"><circle cx="172" cy="292" r="72" fill="#fff" stroke="#1a1a1a" stroke-width="3"/><text x="172" y="303">skills</text></g>
  </g>
  <g fill="#d9621c"><circle cx="450" cy="130" r="12"/><circle cx="728" cy="292" r="12"/><circle cx="728" cy="608" r="12"/><circle cx="450" cy="770" r="12"/><circle cx="172" cy="608" r="12"/><circle cx="172" cy="292" r="12"/></g>
</svg>